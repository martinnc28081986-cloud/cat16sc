function log(msg, cls){
  const d = document.getElementById('log');
  d.innerHTML += '<div'+(cls?' class="'+cls+'"':'')+'>'+msg+'</div>';
  d.scrollTop = d.scrollHeight;
}

window.subirStats = async function(){
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = 'Subiendo...';
  const user = auth.currentUser;
  if(!user){ log('Sin sesión activa.','err'); btn.disabled=false; return; }
  log('Sesión: '+user.email,'info');
  let ok=0, errCount=0;
  for(const [catKey, partidos] of Object.entries(STATS)){
    for(const [matchKey, data] of Object.entries(partidos)){
      const path = 'clubs/sagrado-corazon/'+catKey+'/stats/'+matchKey;
      try{
        await set(ref(db, path), data);
        const total = Object.values(data.jugadores||{}).reduce((s,j)=>s+(j.goles||0),0);
        log('✓ '+catKey+' / '+matchKey+' — '+total+' goles','ok');
        ok++;
      } catch(e){
        log('✗ '+catKey+'/'+matchKey+': '+e.message,'err');
        errCount++;
      }
    }
  }
  log('');
  log(errCount===0 ? 'Listo — '+ok+' partidos subidos.' : ok+' OK, '+errCount+' errores.', errCount>0?'err':'ok');
  btn.textContent = errCount===0 ? '✅ Completado' : 'Reintentar';
  if(errCount>0) btn.disabled=false;
};

onAuthStateChanged(auth, user=>{
  if(user) log('Listo. Sesión: '+user.email,'ok');
  else log('Sin sesión. Logueate en app.miplantel.com.ar primero.','err');
});
