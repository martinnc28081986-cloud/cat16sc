name: Actualizar datos LISFI

on:
  schedule:
    - cron: '0 1 * * 0'   # Domingo 01:00 UTC = Sábado 22:00 Argentina
    - cron: '0 15 * * 2'  # Martes 15:00 UTC  = Martes 12:00 Argentina
  workflow_dispatch:        # Ejecución manual desde la pestaña Actions

permissions:
  contents: write

jobs:
  update-liga:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repo
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4 lxml

      - name: Ejecutar scraper LISFI
        run: python scripts/scrape_lisfi.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add liga_data.json
          if git diff --staged --quiet; then
            echo "Sin cambios en los datos — nada que commitear"
          else
            git commit -m "Auto: datos LISFI $(TZ='America/Argentina/Buenos_Aires' date +'%d/%m/%Y %H:%M ART')"
            git push
          fi
