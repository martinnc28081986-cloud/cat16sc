<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Fix cat2019</title>
<style>
body{font-family:sans-serif;background:#07186b;color:#e8efff;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:20px;box-sizing:border-box;}
.card{background:#0d2280;border:1px solid #1e3ab0;border-radius:14px;padding:24px;max-width:480px;width:100%;text-align:center;}
h1{font-size:1.3rem;margin:0 0 6px;color:#4d73f5;}
p{font-size:.82rem;color:#7a9ccc;margin:0 0 20px;}
button{background:#ff1744;color:#fff;border:none;border-radius:9px;padding:12px 28px;font-size:1rem;font-weight:700;cursor:pointer;width:100%;margin-bottom:8px;}
button:disabled{opacity:.5;cursor:not-allowed;}
#log{margin-top:16px;text-align:left;font-size:.75rem;color:#7a9ccc;max-height:300px;overflow-y:auto;background:#07186b;border-radius:8px;padding:10px;font-family:monospace;}
.ok{color:#22cd78} .err{color:#ff1744} .info{color:#ffab40}
</style>
</head>
<body>
<div class="card">
  <h1>🗑️ Fix cat2019</h1>
  <p>Elimina "López Machado Milo" (con tilde) y "Lucca" de todos los stats de cat2019.</p>
  <button id="btn" onclick="fix()">Eliminar jugadores duplicados</button>
  <div id="log"></div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyBnQeoRwr8ZZOfuwk_h2yXsgv4Q1KqSo7w",
  authDomain:"presentes-20226-cat-16-sc.firebaseapp.com",
  databaseURL:"https://presentes-20226-cat-16-sc-default-rtdb.firebaseio.com",
  projectId:"presentes-20226-cat-16-sc"
});
const db = getDatabase(app);
const auth = getAuth(app);
const PATH = 'clubs/sagrado-corazon/cat2019/stats';
const BORRAR = ['L\u00f3pez Machado Milo', 'Lucca'];

function log(msg,cls){ const d=document.getElementById('log'); d.innerHTML+='<div'+(cls?' class="'+cls+'"':'')+'>'+msg+'</div>'; d.scrollTop=d.scrollHeight; }
onAuthStateChanged(auth, u => { if(u) log('Sesión: '+u.email,'ok'); else log('Sin sesión','err'); });

window.fix = async function(){
  const btn=document.getElementById('btn');
  btn.disabled=true; btn.textContent='Procesando...';
  const snap = await get(ref(db, PATH));
  if(!snap.exists()){ log('Sin stats.','info'); btn.disabled=false; return; }
  const updates = {};
  let total=0;
  snap.forEach(fechaSnap => {
    const jugs = (fechaSnap.val().jugadores)||{};
    BORRAR.forEach(nombre => {
      if(jugs[nombre] !== undefined){
        updates[`${PATH}/${fechaSnap.key}/jugadores/${nombre}`] = null;
        log(`Borrado: "${nombre}" (${fechaSnap.key})`,'info');
        total++;
      }
    });
  });
  if(total===0){ log('No se encontraron.','info'); btn.textContent='Listo'; return; }
  await update(ref(db), updates);
  log(`✓ ${total} entrada(s) eliminadas.`,'ok');
  btn.textContent='✅ Completado';
};
</script>
</body>
</html>
