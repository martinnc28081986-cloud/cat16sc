<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fix Stats 2026 — MI PLANTEL</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#07186b;color:#e8efff;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:#0d2280;border:1px solid #1e3ab0;border-radius:14px;padding:24px;max-width:500px;width:100%;text-align:center}
h1{font-size:1.3rem;margin:0 0 6px;color:#4d73f5}
p{font-size:.82rem;color:#7a9ccc;margin:0 0 20px}
button{background:#22cd78;color:#000;border:none;border-radius:9px;padding:12px 28px;font-size:1rem;font-weight:700;cursor:pointer;width:100%;margin-bottom:8px}
button:disabled{opacity:.5;cursor:not-allowed}
#log{margin-top:16px;text-align:left;font-size:.75rem;color:#7a9ccc;max-height:340px;overflow-y:auto;background:#07186b;border-radius:8px;padding:10px;font-family:monospace}
.ok{color:#22cd78} .err{color:#ff1744} .info{color:#ffab40} .muted{color:#4a5a8a}
</style>
</head>
<body>
<div class="card">
  <h1>⚽ Fix Stats 2026</h1>
  <p>Recorre los stats de cada categoría y renombra jugadores cuyo nombre no coincide exactamente con el Excel (ignora acentos para detectar el match).</p>
  <button id="btn" onclick="fix()">Corregir nombres en stats 2026</button>
  <div id="log"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyBnQeoRwr8ZZOfuwk_h2yXsgv4Q1KqSo7w",
  authDomain:"presentes-20226-cat-16-sc.firebaseapp.com",
  databaseURL:"https://presentes-20226-cat-16-sc-default-rtdb.firebaseio.com",
  projectId:"presentes-20226-cat-16-sc"
});
const db = getDatabase(app);
const auth = getAuth(app);
const CLUB = 'clubs/sagrado-corazon';

// Nombres correctos 2026 por categoría (del Excel corregido)
const EXCEL_2026 = {
  cat13:["Baraglia Romeo","Scotto Lucio","Auricchio Felipe","Coronel Salvador","Tortorelli Junior","Torres Guillermo","Baldoni Thiago","Celis Juan Pablo","Volpi Juan Ignacio","Benitez Bastian","Fontela Severino"],
  cat2014:["Colque Bautista","Di Pietro Vicente","Seranggioli Francisco","Sagarra Salvador","Costa Blas","Sosa Ciriaco","Traversaro Bautista","De Francisco Pedro","Silvero Mateo","Castillo Miqueas"],
  cat2015:["Agristola Felipe","Pereyra Thiago","Arona Ciro","Baldini Santino","Valbruni Thiago","Cantaleano Miqueas","Baraglia Felipe","Arona Thiago","La Rosa Valentin"],
  cat16:["Feli","Benja","Santi","Juan Cruz","Rafa","Mateo","Faustino","Juan Martin","William","Ramiro","Camilo","Pedro","Vicente","Ciro","Rafa B"],
  cat2017:["Juan","Recio","Fermin","Lorenzo","Guarda","Carmelo","Pedro","Simon","Aurichio","Dante","Burruchaga"],
  cat2018:["Bautista F","Vicente","Lautaro","Ciro T","Simon","Felipe P","Francisco C"],
  cat2019:["Pochettino Vico","Lopez Machado Milo","Loredo Camilo","Chiarlo Manuel","Ranieri Gino","Cardoso Felipe","Etchepare Juan Pedro","Costa Gaspar"],
  cat2020:["Olivetto Tomas","Campañaro Lucca","Miron Amaro","Picone Santino","Ramirez Fausto","Baldini Felipe","Rodriguez Bruno","Cerecedo Benicio","Violini Gabriel","De Franco Bruno","Villafañe Bahiano","Parente Juan Ignacio","Roberto Aaron"]
};

// Normalizar: quitar acentos y pasar a minúsculas para comparar
function norm(s){ return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim(); }

// Para cada nombre en stats, buscar el nombre correcto en Excel (ignorando acentos)
function findCorrect(nombre, correctList){
  const n = norm(nombre);
  return correctList.find(c => norm(c) === n) || null;
}

const logEl = document.getElementById('log');
function log(msg, cls){
  logEl.innerHTML += '<div'+(cls?' class="'+cls+'"':'')+'>'+msg+'</div>';
  logEl.scrollTop = logEl.scrollHeight;
}

onAuthStateChanged(auth, user => {
  if(user) log('✓ Sesión: '+user.email,'ok');
  else log('Sin sesión — abrí desde app.miplantel.com.ar','err');
});

window.fix = async function(){
  const btn = document.getElementById('btn');
  btn.disabled = true; btn.textContent = 'Procesando...';
  let totalRenames = 0, totalCats = 0;

  for(const [catKey, correctNames] of Object.entries(EXCEL_2026)){
    const path = `${CLUB}/${catKey}/stats`;
    log(`\n── ${catKey} ──────────`, 'muted');
    try {
      const snap = await get(ref(db, path));
      if(!snap.exists()){ log('  Sin stats','muted'); continue; }

      const updates = {};
      let catRenames = 0;

      snap.forEach(fechaSnap => {
        const stats = fechaSnap.val();
        const jugs = stats.jugadores || {};
        Object.keys(jugs).forEach(nombre => {
          if(correctNames.includes(nombre)) return; // ya está bien
          const correcto = findCorrect(nombre, correctNames);
          if(!correcto) return; // no hay match, no tocamos
          // Renombrar: copiar datos al nombre correcto, borrar el viejo
          const base = `${path}/${fechaSnap.key}/jugadores`;
          const dataViejo = jugs[nombre];
          const dataExistente = jugs[correcto];
          if(dataExistente){
            // Ya existe el nombre correcto — sumar goles/tarjetas
            updates[`${base}/${correcto}`] = {
              goles: (dataViejo.goles||0) + (dataExistente.goles||0),
              amarilla: (dataViejo.amarilla||0) + (dataExistente.amarilla||0),
              roja: (dataViejo.roja||0) + (dataExistente.roja||0),
            };
          } else {
            updates[`${base}/${correcto}`] = dataViejo;
          }
          updates[`${base}/${nombre}`] = null;
          log(`  "${nombre}" → "${correcto}" (${fechaSnap.key})`,'info');
          catRenames++;
        });
      });

      if(catRenames > 0){
        await update(ref(db), updates);
        log(`  ✓ ${catRenames} rename(s) aplicados`,'ok');
        totalRenames += catRenames;
        totalCats++;
      } else {
        log('  ✓ Todos los nombres ya son correctos','ok');
      }
    } catch(e){
      log('  ✗ Error: '+e.message,'err');
    }
  }

  log(`\n══════════════════════════`,'muted');
  log(`Listo — ${totalRenames} correcciones en ${totalCats} categorías.`, totalRenames>0?'ok':'muted');
  btn.textContent = '✅ Completado';
};
</script>
</body>
</html>
