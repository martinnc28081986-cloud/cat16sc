function log(msg, cls){
  const d = document.getElementById('log');
  d.innerHTML += '<div' + (cls?' class="'+cls+'"':'') + '>' + msg + '</div>';
  d.scrollTop = d.scrollHeight;
}

window.subirTodo = async function(){
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = 'Subiendo...';

  const user = auth.currentUser;
  if(!user){
    log('No hay sesión activa. Logueate en la app primero y volvé a abrir esta página.','err');
    btn.disabled = false;
    return;
  }
  log('Sesión: ' + user.email, 'info');

  let ok=0, errCount=0;
  for(const [catKey, jugadores] of Object.entries(HISTORICOS)){
    const path = 'clubs/sagrado-corazon/' + catKey + '/goleadores_historicos';
    const data = {};
    for(const [nombre, anios] of Object.entries(jugadores)){
      const key = nombre.replace(/[.#$\[\]/]/g,'_');
      data[key] = {nombre, anios};
    }
    try{
      await set(ref(database, path), data);
      log('✓ ' + catKey + ' — ' + Object.keys(jugadores).length + ' jugadores', 'ok');
      ok++;
    } catch(e){
      log('✗ ' + catKey + ': ' + e.message, 'err');
      errCount++;
    }
  }
  log('');
  if(errCount === 0){
    log('Listo — ' + ok + ' categorías subidas correctamente.', 'ok');
    btn.textContent = '✅ Completado';
  } else {
    log(ok + ' OK, ' + errCount + ' con error.', 'err');
    btn.disabled = false;
    btn.textContent = 'Reintentar';
  }
};

onAuthStateChanged(auth, user => {
  if(user) log('Listo para subir. Sesión activa: ' + user.email, 'ok');
  else log('Sin sesión. Logueate en app.miplantel.com.ar primero, luego abrí esta página.', 'err');
