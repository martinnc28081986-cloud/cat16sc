function log(msg, cls){
  const d = document.getElementById('log');
  d.innerHTML += '<div'+(cls?' class="'+cls+'"':'')+'>'+msg+'</div>';
  d.scrollTop = d.scrollHeight;
}

window.subir = async function(){
  const btn = document.getElementById('btn');
  btn.disabled = true; btn.textContent = 'Subiendo...';
  const user = auth.currentUser;
  if(!user){ log('Sin sesión activa.','err'); btn.disabled=false; return; }
  log('Sesión: '+user.email,'info');
  try {
    // Liga compartida
    await set(ref(db, 'ligas/lisfi-ii-zona-b-2026'), DATA.ligas['lisfi-ii-zona-b-2026']);
    log('✓ Liga LISFI II Zona B 2026 creada','ok');
    // Config Hernandez
    await set(ref(db, 'clubs/hernandez/config'), DATA.clubs.hernandez.config);
    log('✓ Config de Hernández cargada','ok');
    // Actualizar referencia en Sagrado también
    await update(ref(db, 'clubs/sagrado-corazon/config'), { liga: 'lisfi-ii-zona-b-2026' });
    log('✓ Sagrado Corazón vinculado a la liga','ok');
    log('');
    log('Todo listo ✓','ok');
    btn.textContent = '✅ Completado';
  } catch(e){
    log('Error: '+e.message,'err');
    btn.disabled=false; btn.textContent='Reintentar';
  }
};

onAuthStateChanged(auth, user=>{
  if(user) log('Listo. Sesión: '+user.email,'ok');
